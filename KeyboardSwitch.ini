[Settings]
; InAll: Cycle through all installed keyboard layouts
; InDefine: Switch between layouts defined below
SwitchMode=InDefine

[Layouts]
; Used when SwitchMode=InDefine
; https://learn.microsoft.com/en-us/windows-hardware/manufacture/desktop/default-input-locales-for-windows-language-packs?view=windows-11
; English (United States)
Layout1=00000409
; 00000804 = Chinese (Simplified, PRC)
Layout2=00000804
; Layout3=

[Hotkey]
SwitchHotkey=CapsLock
SwapEscCapsLock=0
NotifyOnSwitch=1

[Shortcuts]
; Shortcut keys configured in Windows Advanced Keyboard Settings
; For each layout, assign a shortcut (1, 2, 3, etc. corresponds to Alt+Shift+1, Alt+Shift+2, etc.)
Shortcut1=1
Shortcut2=2
; Shortcut3=3

; Default is %EDITOR%, fallback notepad
[AutoHotkey]
ScriptEditor=